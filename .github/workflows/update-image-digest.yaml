name: Update WuLims Image Digest

on:
  repository_dispatch:
    types:
      - wulims-image-updated
  workflow_dispatch:
    inputs:
      digest:
        description: "Image digest (sha256:...)"
        required: false
        type: string
      tag:
        description: "Image tag (for example: sha-b5d8f9d)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve digest
        id: resolve
        env:
          INPUT_DIGEST: ${{ inputs.digest }}
          INPUT_TAG: ${{ inputs.tag }}
          PAYLOAD_DIGEST: ${{ github.event.client_payload.digest }}
          PAYLOAD_TAG: ${{ github.event.client_payload.tag }}
          PAYLOAD_SHA: ${{ github.event.client_payload.sha }}
          PAYLOAD_IMAGE: ${{ github.event.client_payload.image }}
        run: |
          set -euo pipefail

          digest="${INPUT_DIGEST:-}"
          tag="${INPUT_TAG:-}"

          if [ -z "$digest" ] && [ -n "${PAYLOAD_DIGEST:-}" ]; then
            digest="$PAYLOAD_DIGEST"
          fi

          if [ -z "$tag" ] && [ -n "${PAYLOAD_TAG:-}" ]; then
            tag="$PAYLOAD_TAG"
          fi

          if [ -z "$digest" ] && [ -n "${PAYLOAD_SHA:-}" ]; then
            digest="sha256:${PAYLOAD_SHA#sha256:}"
          fi

          if [ -z "$digest" ] && [ -n "${PAYLOAD_IMAGE:-}" ]; then
            if [[ "$PAYLOAD_IMAGE" == *":"* ]]; then
              tag="${PAYLOAD_IMAGE##*:}"
            fi
            if [[ "$PAYLOAD_IMAGE" == *"@sha256:"* ]]; then
              digest="sha256:${PAYLOAD_IMAGE##*@sha256:}"
            fi
          fi

          if [ -z "$digest" ] && [ -n "$tag" ]; then
            image_ref="ghcr.io/walsh-university/wulims:${tag}"
            digest_line="$(docker buildx imagetools inspect "$image_ref" | awk '/Digest:/ {print $2; exit}')"
            if [ -n "${digest_line:-}" ]; then
              digest="$digest_line"
            fi
          fi

          if [[ ! "$digest" =~ ^sha256:[a-fA-F0-9]{64}$ ]]; then
            echo "Invalid or missing digest after resolution. digest='$digest' tag='$tag'"
            exit 1
          fi

          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Update overlay image patch
        env:
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          set -euo pipefail
          cat > k8s/overlays/lab/image-patch.yaml <<EOF_PATCH
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: wulims
            namespace: wulims
          spec:
            template:
              spec:
                containers:
                  - name: wulims
                    image: ghcr.io/walsh-university/wulims@${DIGEST}
          EOF_PATCH

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          if git diff --quiet -- k8s/overlays/lab/image-patch.yaml; then
            echo "No image change detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/lab/image-patch.yaml
          git commit -m "chore: update WuLims image digest"
          git push
