apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wulims
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/Walsh-University/WuLims-deploy.git"
    targetRevision: main
    path: k8s/overlays/lab
  destination:
    server: "https://kubernetes.default.svc"
    namespace: wulims
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
